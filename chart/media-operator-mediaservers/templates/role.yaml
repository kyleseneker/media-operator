apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "media-operator.fullname" . }}
  namespace: {{ .Values.watchNamespace }}
  labels:
    {{- include "media-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
