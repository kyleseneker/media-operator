{{- if .Values.metrics.enabled }}
# metrics-auth-role: permission for the operator to call TokenReview and
# SubjectAccessReview so it can authorize metrics scrapers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "media-operator.fullname" . }}-metrics-auth
  labels:
    {{- include "media-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "media-operator.fullname" . }}-metrics-auth
  labels:
    {{- include "media-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "media-operator.fullname" . }}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
---
# metrics-reader: grants callers (e.g., a Prometheus ServiceAccount) permission
# to GET /metrics. Bind this ClusterRole to whichever subject should be allowed
# to scrape.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "media-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "media-operator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- end }}
