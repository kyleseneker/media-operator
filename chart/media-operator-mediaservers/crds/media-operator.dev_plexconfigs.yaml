---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: plexconfigs.media-operator.dev
spec:
  group: media-operator.dev
  names:
    kind: PlexConfig
    listKind: PlexConfigList
    plural: plexconfigs
    singular: plexconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Synced")].status
      name: Synced
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.lastSyncTime
      name: Last Sync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PlexConfig is the Schema for the plexconfigs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PlexConfigSpec defines the desired state of PlexConfig.
            properties:
              connection:
                description: connection defines how to connect to the Plex instance.
                properties:
                  tokenSecretRef:
                    description: tokenSecretRef references a Secret containing the
                      X-Plex-Token.
                    properties:
                      key:
                        description: key is the key within the Secret.
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  url:
                    description: url is the base URL of the Plex server (e.g., http://plex:32400).
                    type: string
                required:
                - tokenSecretRef
                - url
                type: object
              libraries:
                description: libraries defines media libraries to create.
                items:
                  description: PlexLibrary defines a Plex media library.
                  properties:
                    agent:
                      description: agent is the metadata agent to use.
                      type: string
                    language:
                      description: language is the library language (ISO 639-1).
                      type: string
                    name:
                      description: name is the display name of the library.
                      type: string
                    paths:
                      description: paths is the list of media folder paths.
                      items:
                        type: string
                      type: array
                    scanner:
                      description: scanner is the scanner type.
                      type: string
                    type:
                      description: type is the library type.
                      enum:
                      - movie
                      - show
                      - artist
                      - photo
                      type: string
                  required:
                  - name
                  - paths
                  - type
                  type: object
                type: array
              network:
                description: network configures network settings.
                properties:
                  allowedNetworks:
                    description: allowedNetworks is a comma-separated list of networks
                      allowed without auth.
                    type: string
                  customServerAccessUrls:
                    description: customServerAccessUrls is a comma-separated list
                      of custom access URLs.
                    type: string
                  enableIPv6:
                    description: enableIPv6 enables IPv6 support.
                    type: boolean
                  secureConnections:
                    description: secureConnections controls when secure connections
                      are required.
                    enum:
                    - 0
                    - 1
                    - 2
                    type: integer
                type: object
              server:
                description: server configures Plex server settings.
                properties:
                  autoEmptyTrash:
                    description: autoEmptyTrash automatically empties the trash.
                    type: boolean
                  enableRemoteAccess:
                    description: enableRemoteAccess allows access from outside the
                      local network.
                    type: boolean
                  friendlyName:
                    description: friendlyName is the server's display name.
                    type: string
                  language:
                    description: language is the preferred language (ISO 639-1, e.g.,
                      "en").
                    type: string
                  logDebug:
                    description: logDebug enables debug logging.
                    type: boolean
                  scanMyLibraryAutomatically:
                    description: scanMyLibraryAutomatically enables automatic library
                      scanning.
                    type: boolean
                  scanMyLibraryPeriodically:
                    description: scanMyLibraryPeriodically enables periodic library
                      scanning.
                    type: boolean
                type: object
              transcoder:
                description: transcoder configures transcoding and hardware acceleration.
                properties:
                  hardwareAccelerationType:
                    description: hardwareAccelerationType sets the HW acceleration
                      type.
                    type: string
                  maxSimultaneousVideoTranscodes:
                    description: maxSimultaneousVideoTranscodes limits concurrent
                      transcodes. 0 = unlimited.
                    type: integer
                  transcodeHwDecodingEnabled:
                    description: transcodeHwDecodingEnabled enables hardware decoding.
                    type: boolean
                  transcodeHwEncodingEnabled:
                    description: transcodeHwEncodingEnabled enables hardware encoding.
                    type: boolean
                  transcodeHwRequested:
                    description: transcodeHwRequested enables hardware-accelerated
                      transcoding.
                    type: boolean
                  transcoderTempDirectory:
                    description: transcoderTempDirectory sets the transcoder temporary
                      directory.
                    type: string
                type: object
            required:
            - connection
            type: object
          status:
            description: PlexConfigStatus defines the observed state of PlexConfig.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - metadata
        - spec
        - status
        type: object
    served: true
    storage: true
    subresources:
      status: {}
