---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: jellyfinconfigs.media-operator.dev
spec:
  group: media-operator.dev
  names:
    kind: JellyfinConfig
    listKind: JellyfinConfigList
    plural: jellyfinconfigs
    singular: jellyfinconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Synced")].status
      name: Synced
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.lastSyncTime
      name: Last Sync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: JellyfinConfig is the Schema for the jellyfinconfigs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: JellyfinConfigSpec defines the desired state of JellyfinConfig.
            properties:
              adminUser:
                description: adminUser defines the admin credentials used for initial
                  setup and API access.
                properties:
                  passwordSecretRef:
                    description: passwordSecretRef references a Secret containing
                      the admin password.
                    properties:
                      key:
                        description: key is the key within the Secret.
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  usernameSecretRef:
                    description: usernameSecretRef references a Secret containing
                      the admin username.
                    properties:
                      key:
                        description: key is the key within the Secret.
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - passwordSecretRef
                - usernameSecretRef
                type: object
              connection:
                description: connection defines how to connect to the Jellyfin instance.
                properties:
                  url:
                    description: url is the base URL of the Jellyfin instance (e.g.,
                      http://jellyfin.media.svc.cluster.local:8096).
                    type: string
                required:
                - url
                type: object
              encoding:
                description: encoding configures hardware-accelerated transcoding
                  settings.
                properties:
                  allowHevcEncoding:
                    description: allowHevcEncoding allows HEVC/H.265 hardware encoding.
                    type: boolean
                  enableHardwareEncoding:
                    description: enableHardwareEncoding enables hardware-accelerated
                      encoding.
                    type: boolean
                  enableIntelLowPowerH264HwEncoder:
                    description: enableIntelLowPowerH264HwEncoder enables the Intel
                      low-power H.264 hardware encoder.
                    type: boolean
                  enableIntelLowPowerHevcHwEncoder:
                    description: enableIntelLowPowerHevcHwEncoder enables the Intel
                      low-power HEVC hardware encoder.
                    type: boolean
                  enableSubtitleExtraction:
                    description: enableSubtitleExtraction enables extracting subtitles
                      from media files.
                    type: boolean
                  enableThrottling:
                    description: enableThrottling enables transcoding throttling.
                    type: boolean
                  enableTonemapping:
                    description: enableTonemapping enables HDR to SDR tone mapping.
                    type: boolean
                  enableVppTonemapping:
                    description: enableVppTonemapping enables VPP-based tone mapping
                      (Intel QSV).
                    type: boolean
                  encoderPreset:
                    description: encoderPreset is the encoder speed preset (e.g.,
                      "auto", "fast", "medium", "slow").
                    type: string
                  h264Crf:
                    description: h264Crf is the CRF value for H.264 encoding.
                    type: integer
                  h265Crf:
                    description: h265Crf is the CRF value for H.265/HEVC encoding.
                    type: integer
                  hardwareAccelerationType:
                    description: hardwareAccelerationType is the hardware acceleration
                      method to use.
                    enum:
                    - none
                    - vaapi
                    - qsv
                    - nvenc
                    type: string
                  hardwareDecodingCodecs:
                    description: hardwareDecodingCodecs is the list of codecs to decode
                      in hardware.
                    items:
                      type: string
                    type: array
                  throttleDelaySeconds:
                    description: throttleDelaySeconds is the delay in seconds before
                      throttling begins.
                    type: integer
                  vaapiDevice:
                    description: vaapiDevice is the VAAPI render device path (e.g.,
                      "/dev/dri/renderD128").
                    type: string
                type: object
              libraries:
                description: libraries defines media libraries to create and configure.
                items:
                  description: JellyfinLibrary defines a media library to create in
                    Jellyfin.
                  properties:
                    automaticRefreshIntervalDays:
                      description: automaticRefreshIntervalDays is the number of days
                        between automatic library scans.
                      type: integer
                    collectionType:
                      description: collectionType is the type of media in this library.
                      enum:
                      - movies
                      - tvshows
                      - music
                      - musicvideos
                      - homevideos
                      - books
                      - mixed
                      type: string
                    enableRealtimeMonitor:
                      description: enableRealtimeMonitor enables real-time monitoring
                        of library paths for changes.
                      type: boolean
                    enableTrickplayImageExtraction:
                      description: enableTrickplayImageExtraction enables generation
                        of trickplay (scrubbing preview) images.
                      type: boolean
                    metadataCountryCode:
                      description: metadataCountryCode overrides the server-level
                        metadata country code for this library.
                      type: string
                    name:
                      description: name is the display name of the library.
                      type: string
                    paths:
                      description: paths is the list of filesystem paths containing
                        media for this library.
                      items:
                        type: string
                      type: array
                    preferredMetadataLanguage:
                      description: preferredMetadataLanguage overrides the server-level
                        preferred metadata language for this library.
                      type: string
                  required:
                  - collectionType
                  - name
                  - paths
                  type: object
                type: array
              server:
                description: server configures Jellyfin server settings.
                properties:
                  displaySpecialsWithinSeasons:
                    description: displaySpecialsWithinSeasons displays special episodes
                      within their respective seasons.
                    type: boolean
                  enableGroupingMoviesIntoCollections:
                    description: enableGroupingMoviesIntoCollections enables automatic
                      grouping of movies into collections.
                    type: boolean
                  libraryMonitorDelay:
                    description: libraryMonitorDelay is the delay in seconds before
                      processing library changes.
                    type: integer
                  logFileRetentionDays:
                    description: logFileRetentionDays is the number of days to retain
                      log files.
                    type: integer
                  metadataCountryCode:
                    description: metadataCountryCode is the country code for metadata
                      lookups (e.g., "US").
                    type: string
                  preferredMetadataLanguage:
                    description: preferredMetadataLanguage is the preferred language
                      for metadata (e.g., "en").
                    type: string
                  serverName:
                    description: serverName is the friendly name of the server.
                    type: string
                type: object
            required:
            - adminUser
            - connection
            type: object
          status:
            description: JellyfinConfigStatus defines the observed state of JellyfinConfig.
            properties:
              conditions:
                description: conditions represent the current state of the JellyfinConfig
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              initialized:
                description: initialized indicates whether the Jellyfin setup wizard
                  has been completed.
                type: boolean
              lastSyncTime:
                description: lastSyncTime is the timestamp of the last successful
                  reconciliation.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
