---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: radarrconfigs.media-operator.dev
spec:
  group: media-operator.dev
  names:
    kind: RadarrConfig
    listKind: RadarrConfigList
    plural: radarrconfigs
    singular: radarrconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Synced")].status
      name: Synced
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.lastSyncTime
      name: Last Sync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RadarrConfig is the Schema for the radarrconfigs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RadarrConfigSpec defines the desired state of RadarrConfig.
            properties:
              connection:
                description: connection defines how to connect to the Radarr instance.
                properties:
                  apiKeySecretRef:
                    description: apiKeySecretRef references a Secret containing the
                      API key.
                    properties:
                      key:
                        description: key is the key within the Secret.
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  url:
                    description: url is the base URL of the app (e.g., http://arr-sonarr.arr.svc.cluster.local:8989).
                    type: string
                required:
                - apiKeySecretRef
                - url
                type: object
              downloadClientConfig:
                description: downloadClientConfig configures global download client
                  behavior.
                properties:
                  autoRedownloadFailed:
                    default: true
                    description: autoRedownloadFailed automatically searches when
                      a download fails.
                    type: boolean
                  autoRedownloadFailedFromInteractiveSearch:
                    description: autoRedownloadFailedFromInteractiveSearch auto-searches
                      failed interactive searches.
                    type: boolean
                  checkForFinishedDownloadInterval:
                    description: checkForFinishedDownloadInterval is the interval
                      in minutes to check for finished downloads.
                    type: integer
                  enableCompletedDownloadHandling:
                    default: true
                    description: enableCompletedDownloadHandling auto-imports completed
                      downloads.
                    type: boolean
                type: object
              downloadClients:
                description: downloadClients defines download client connections.
                items:
                  description: DownloadClient defines a download client connection.
                  properties:
                    category:
                      description: category is the download category to use.
                      type: string
                    enable:
                      default: true
                      description: enable controls whether this download client is
                        active.
                      type: boolean
                    host:
                      description: host is the hostname or IP of the download client.
                      type: string
                    implementation:
                      description: implementation is the download client type (e.g.,
                        QBittorrent).
                      type: string
                    name:
                      description: name is the display name of the download client.
                      type: string
                    port:
                      description: port is the port of the download client.
                      type: integer
                    removeCompletedDownloads:
                      default: true
                      description: removeCompletedDownloads controls whether completed
                        downloads are removed.
                      type: boolean
                    removeFailedDownloads:
                      default: true
                      description: removeFailedDownloads controls whether failed downloads
                        are removed.
                      type: boolean
                  required:
                  - host
                  - implementation
                  - name
                  - port
                  type: object
                type: array
              indexerConfig:
                description: indexerConfig configures global indexer settings.
                properties:
                  allowHardcodedSubs:
                    description: allowHardcodedSubs allows importing releases with
                      hardcoded subtitles.
                    type: boolean
                  availabilityDelay:
                    description: availabilityDelay is the number of days to wait after
                      a movie is available before searching.
                    type: integer
                  maximumSize:
                    description: maximumSize is the maximum release size in MB. 0
                      means unlimited.
                    type: integer
                  minimumAge:
                    description: minimumAge is the minimum age in minutes before downloading.
                    type: integer
                  preferIndexerFlags:
                    description: preferIndexerFlags prefers releases with indexer
                      flags.
                    type: boolean
                  retention:
                    description: retention is the usenet retention in days. 0 means
                      unlimited.
                    type: integer
                  rssSyncInterval:
                    description: rssSyncInterval is the RSS sync interval in minutes.
                      0 disables RSS.
                    type: integer
                  whitelistedHardcodedSubs:
                    description: whitelistedHardcodedSubs is a comma-separated list
                      of subtitle languages to allow when hardcoded.
                    type: string
                type: object
              mediaManagement:
                description: mediaManagement configures media management settings.
                properties:
                  autoRenameFolders:
                    description: autoRenameFolders automatically renames movie folders
                      when the movie title changes.
                    type: boolean
                  autoUnmonitorPreviouslyDownloadedMovies:
                    description: autoUnmonitorPreviouslyDownloadedMovies unmonitors
                      movies that have been downloaded.
                    type: boolean
                  copyUsingHardlinks:
                    default: true
                    description: copyUsingHardlinks uses hardlinks instead of copies
                      when importing.
                    type: boolean
                  createEmptyMovieFolders:
                    description: createEmptyMovieFolders creates folders for movies
                      with no files.
                    type: boolean
                  deleteEmptyFolders:
                    default: true
                    description: deleteEmptyFolders removes empty movie folders after
                      cleanup.
                    type: boolean
                  downloadPropersAndRepacks:
                    description: downloadPropersAndRepacks controls how proper/repack
                      releases are handled.
                    enum:
                    - preferAndUpgrade
                    - doNotPrefer
                    - doNotUpgrade
                    type: string
                  enableMediaInfo:
                    description: enableMediaInfo enables media info scanning.
                    type: boolean
                  extraFileExtensions:
                    description: extraFileExtensions is a comma-separated list of
                      extra file extensions to import.
                    type: string
                  importExtraFiles:
                    description: importExtraFiles imports additional files (subtitles,
                      etc.) alongside media.
                    type: boolean
                  minimumFreeSpaceWhenImporting:
                    description: minimumFreeSpaceWhenImporting is the minimum free
                      space in MB required to import.
                    type: integer
                  pathsDefaultStatic:
                    description: pathsDefaultStatic prevents Radarr from updating
                      paths when the root folder changes.
                    type: boolean
                  recycleBin:
                    description: recycleBin is the path to the recycling bin folder.
                      Empty disables.
                    type: string
                  recycleBinCleanupDays:
                    description: recycleBinCleanupDays is how many days files stay
                      in the recycling bin.
                    type: integer
                  rescanAfterRefresh:
                    description: rescanAfterRefresh controls when to rescan movie
                      folders.
                    enum:
                    - always
                    - afterManual
                    - never
                    type: string
                  setPermissionsLinux:
                    description: setPermissionsLinux enables setting file permissions
                      on import.
                    type: boolean
                  skipFreeSpaceCheckWhenImporting:
                    description: skipFreeSpaceCheckWhenImporting skips free space
                      check during import.
                    type: boolean
                type: object
              naming:
                description: naming configures movie and folder naming formats.
                properties:
                  colonReplacementFormat:
                    description: colonReplacementFormat defines how colons are replaced
                      in filenames.
                    enum:
                    - delete
                    - dash
                    - spaceDash
                    - spaceDashSpace
                    - smart
                    type: string
                  movieFolderFormat:
                    description: movieFolderFormat is the naming format for movie
                      folders.
                    type: string
                  renameMovies:
                    description: renameMovies enables automatic movie file renaming.
                    type: boolean
                  replaceIllegalCharacters:
                    description: replaceIllegalCharacters replaces illegal characters
                      in filenames.
                    type: boolean
                  standardMovieFormat:
                    description: standardMovieFormat is the naming format for movies.
                    type: string
                type: object
              rootFolders:
                description: rootFolders defines media library root folder paths.
                items:
                  description: RootFolder defines a media root folder path.
                  properties:
                    path:
                      description: path is the filesystem path for the root folder
                        inside the container.
                      type: string
                  required:
                  - path
                  type: object
                type: array
              ui:
                description: ui configures UI display settings.
                properties:
                  enableColorImpairedMode:
                    description: enableColorImpairedMode enables color-impaired accessibility
                      mode.
                    type: boolean
                  firstDayOfWeek:
                    description: firstDayOfWeek is the first day of the week. 0=Sunday,
                      1=Monday.
                    maximum: 1
                    minimum: 0
                    type: integer
                  longDateFormat:
                    description: longDateFormat is the long date display format.
                    type: string
                  movieInfoLanguage:
                    description: movieInfoLanguage is the language ID for movie information.
                      -1=Original.
                    type: integer
                  movieRuntimeFormat:
                    description: movieRuntimeFormat controls how movie runtimes are
                      displayed.
                    enum:
                    - hoursMinutes
                    - minutes
                    type: string
                  shortDateFormat:
                    description: shortDateFormat is the short date display format.
                    type: string
                  showRelativeDates:
                    description: showRelativeDates shows relative dates (today, yesterday).
                    type: boolean
                  theme:
                    description: theme is the UI theme.
                    enum:
                    - auto
                    - dark
                    - light
                    type: string
                  timeFormat:
                    description: timeFormat is the time display format.
                    type: string
                  uiLanguage:
                    description: uiLanguage is the UI language ID. 1=English.
                    type: integer
                type: object
            required:
            - connection
            type: object
          status:
            description: RadarrConfigStatus defines the observed state of RadarrConfig.
            properties:
              conditions:
                description: conditions represent the current state of the RadarrConfig
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                description: lastSyncTime is the timestamp of the last successful
                  reconciliation.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
