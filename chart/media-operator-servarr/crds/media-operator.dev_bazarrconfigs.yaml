---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bazarrconfigs.media-operator.dev
spec:
  group: media-operator.dev
  names:
    kind: BazarrConfig
    listKind: BazarrConfigList
    plural: bazarrconfigs
    singular: bazarrconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Synced")].status
      name: Synced
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.lastSyncTime
      name: Last Sync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BazarrConfig is the Schema for the bazarrconfigs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BazarrConfigSpec defines the desired state of BazarrConfig.
            properties:
              connection:
                description: connection defines how to connect to the Bazarr instance.
                properties:
                  apiKeySecretRef:
                    description: apiKeySecretRef references a Secret containing the
                      API key.
                    properties:
                      key:
                        description: key is the key within the Secret.
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  url:
                    description: url is the base URL of the app (e.g., http://arr-sonarr.arr.svc.cluster.local:8989).
                    type: string
                required:
                - apiKeySecretRef
                - url
                type: object
              general:
                description: general configures general Bazarr settings.
                properties:
                  adaptiveSearching:
                    description: adaptiveSearching enables adaptive searching for
                      subtitles.
                    type: boolean
                  chmodEnabled:
                    description: chmodEnabled enables setting file permissions on
                      subtitle files.
                    type: boolean
                  embeddedSubtitlesParser:
                    description: embeddedSubtitlesParser is the parser used for embedded
                      subtitles.
                    type: string
                  hiExtension:
                    description: hiExtension is the file extension used for hearing-impaired
                      subtitle files.
                    type: string
                  ignoreAssSubs:
                    description: ignoreAssSubs ignores ASS/SSA subtitles.
                    type: boolean
                  ignorePgsSubs:
                    description: ignorePgsSubs ignores PGS (image-based) subtitles.
                    type: boolean
                  ignoreVobsubSubs:
                    description: ignoreVobsubSubs ignores VobSub (image-based) subtitles.
                    type: boolean
                  minimumScore:
                    description: minimumScore is the minimum subtitle match score
                      for series.
                    type: integer
                  minimumScoreMovie:
                    description: minimumScoreMovie is the minimum subtitle match score
                      for movies.
                    type: integer
                  multithreading:
                    description: multithreading enables multithreaded subtitle downloading.
                    type: boolean
                  upgradeFrequency:
                    description: upgradeFrequency is the frequency in hours to check
                      for subtitle upgrades.
                    type: integer
                  upgradeSubs:
                    description: upgradeSubs enables automatic subtitle upgrades when
                      better ones are found.
                    type: boolean
                  usePostprocessing:
                    description: usePostprocessing enables post-processing of downloaded
                      subtitles.
                    type: boolean
                  useRadarr:
                    description: useRadarr enables the Radarr integration.
                    type: boolean
                  useScenename:
                    description: useScenename uses scene names for subtitle searching.
                    type: boolean
                  useSonarr:
                    description: useSonarr enables the Sonarr integration.
                    type: boolean
                  utf8Encode:
                    description: utf8Encode encodes subtitles to UTF-8.
                    type: boolean
                  wantedSearchFrequency:
                    description: wantedSearchFrequency is the frequency in hours to
                      search for wanted subtitles.
                    type: integer
                type: object
              languages:
                description: languages configures language settings and profiles.
                properties:
                  enabled:
                    description: enabled is the list of enabled subtitle languages
                      as ISO 639-1 codes.
                    items:
                      type: string
                    type: array
                  profiles:
                    description: profiles defines language profiles for subtitle selection.
                    items:
                      description: BazarrLanguageProfile defines a language profile
                        for subtitle selection.
                      properties:
                        items:
                          description: items defines the language items in this profile.
                          items:
                            description: BazarrLanguageItem defines a language entry
                              within a language profile.
                            properties:
                              audioExclude:
                                description: audioExclude excludes this language if
                                  audio already matches.
                                type: boolean
                              forced:
                                description: forced indicates whether forced subtitles
                                  are preferred.
                                type: boolean
                              hi:
                                description: hi indicates whether hearing-impaired
                                  subtitles are preferred.
                                type: boolean
                              language:
                                description: language is the ISO 639-1 language code.
                                type: string
                            required:
                            - language
                            type: object
                          type: array
                        name:
                          description: name is the display name of the language profile.
                          type: string
                        profileId:
                          description: profileId is the unique identifier for this
                            profile.
                          type: integer
                      required:
                      - name
                      - profileId
                      type: object
                    type: array
                type: object
              providers:
                description: providers defines subtitle provider configurations.
                items:
                  description: BazarrProvider defines a subtitle provider configuration.
                  properties:
                    enabled:
                      description: enabled controls whether this provider is active.
                      type: boolean
                    name:
                      description: name is the provider key (e.g., opensubtitlescom,
                        addic7ed).
                      type: string
                    settings:
                      additionalProperties:
                        type: string
                      description: settings is a map of provider-specific settings.
                        Values starting with "ENV:" are substituted from secrets.
                      type: object
                  required:
                  - name
                  type: object
                type: array
              radarrConnection:
                description: radarrConnection configures the connection to a Radarr
                  instance.
                properties:
                  apiKeySecretRef:
                    description: apiKeySecretRef references a Secret containing the
                      application's API key.
                    properties:
                      key:
                        description: key is the key within the Secret.
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  basePath:
                    description: basePath is the URL base path of the application.
                    type: string
                  fullUpdate:
                    description: fullUpdate controls how often a full library sync
                      is performed.
                    enum:
                    - Daily
                    - Weekly
                    - Manually
                    type: string
                  host:
                    description: host is the hostname or IP of the application.
                    type: string
                  httpTimeout:
                    description: httpTimeout is the HTTP request timeout in seconds.
                    type: integer
                  onlyMonitored:
                    description: onlyMonitored limits subtitle searches to monitored
                      items only.
                    type: boolean
                  port:
                    description: port is the port of the application.
                    type: integer
                  ssl:
                    description: ssl enables HTTPS connections to the application.
                    type: boolean
                  syncInterval:
                    description: syncInterval is the sync interval in hours.
                    type: integer
                required:
                - apiKeySecretRef
                - host
                - port
                type: object
              sonarrConnection:
                description: sonarrConnection configures the connection to a Sonarr
                  instance.
                properties:
                  apiKeySecretRef:
                    description: apiKeySecretRef references a Secret containing the
                      application's API key.
                    properties:
                      key:
                        description: key is the key within the Secret.
                        type: string
                      name:
                        description: name is the name of the Secret.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  basePath:
                    description: basePath is the URL base path of the application.
                    type: string
                  fullUpdate:
                    description: fullUpdate controls how often a full library sync
                      is performed.
                    enum:
                    - Daily
                    - Weekly
                    - Manually
                    type: string
                  host:
                    description: host is the hostname or IP of the application.
                    type: string
                  httpTimeout:
                    description: httpTimeout is the HTTP request timeout in seconds.
                    type: integer
                  onlyMonitored:
                    description: onlyMonitored limits subtitle searches to monitored
                      items only.
                    type: boolean
                  port:
                    description: port is the port of the application.
                    type: integer
                  ssl:
                    description: ssl enables HTTPS connections to the application.
                    type: boolean
                  syncInterval:
                    description: syncInterval is the sync interval in hours.
                    type: integer
                required:
                - apiKeySecretRef
                - host
                - port
                type: object
              subSync:
                description: subSync configures subtitle synchronization settings.
                properties:
                  subsyncMovieThreshold:
                    description: subsyncMovieThreshold is the minimum score threshold
                      for movie subtitle sync.
                    type: integer
                  subsyncThreshold:
                    description: subsyncThreshold is the minimum score threshold for
                      series subtitle sync.
                    type: integer
                  useSubsync:
                    description: useSubsync enables automatic subtitle synchronization.
                    type: boolean
                  useSubsyncMovieThreshold:
                    description: useSubsyncMovieThreshold enables a score threshold
                      for movie subtitle sync.
                    type: boolean
                  useSubsyncThreshold:
                    description: useSubsyncThreshold enables a score threshold for
                      series subtitle sync.
                    type: boolean
                type: object
            required:
            - connection
            type: object
          status:
            description: BazarrConfigStatus defines the observed state of BazarrConfig.
            properties:
              conditions:
                description: conditions represent the current state of the BazarrConfig
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                description: lastSyncTime is the timestamp of the last successful
                  reconciliation.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
