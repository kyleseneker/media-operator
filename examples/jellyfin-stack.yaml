# Common homelab stack: Sonarr + Radarr + Prowlarr + qBittorrent + Jellyfin
# This is the Jellyfin-based variant (vs Plex). Adjust URLs to match your cluster.
#
# Prerequisites:
#   - Apps deployed and accessible at the URLs below
#   - Secrets created (see secrets.yaml)
#   - media-operator operator installed:
#     helm install media-operator oci://ghcr.io/kyleseneker/media-operator/chart \
#       --set enableControllers=sonarr,radarr,prowlarr,qbittorrent,jellyfin
---
apiVersion: media-operator.dev/v1alpha1
kind: SonarrConfig
metadata:
  name: sonarr
  namespace: media
spec:
  connection:
    url: http://sonarr.media.svc.cluster.local:8989
    apiKeySecretRef:
      name: sonarr-credentials
      key: api-key
  mediaManagement:
    copyUsingHardlinks: true
    deleteEmptyFolders: true
    importExtraFiles: true
    extraFileExtensions: "srt,nfo"
  naming:
    renameEpisodes: true
    replaceIllegalCharacters: true
    standardEpisodeFormat: "{Series TitleYear} - S{season:00}E{episode:00} - {Episode CleanTitle} [{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{MediaInfo AudioLanguages}{-Release Group}"
    seriesFolderFormat: "{Series TitleYear}"
    seasonFolderFormat: "Season {season:00}"
  downloadClientConfig:
    enableCompletedDownloadHandling: true
    autoRedownloadFailed: true
  rootFolders:
    - path: /media/tv
  downloadClients:
    - name: qBittorrent
      protocol: torrent
      implementation: QBittorrent
      host: qbittorrent.media.svc.cluster.local
      port: 8080
      category: tv-sonarr
---
apiVersion: media-operator.dev/v1alpha1
kind: RadarrConfig
metadata:
  name: radarr
  namespace: media
spec:
  connection:
    url: http://radarr.media.svc.cluster.local:7878
    apiKeySecretRef:
      name: radarr-credentials
      key: api-key
  mediaManagement:
    copyUsingHardlinks: true
    deleteEmptyFolders: true
    importExtraFiles: true
    extraFileExtensions: "srt,nfo"
  naming:
    renameMovies: true
    replaceIllegalCharacters: true
    standardMovieFormat: "{Movie CleanTitle} {(Release Year)} {imdb-{ImdbId}} [{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[MediaInfo AudioCodec}{ MediaInfo AudioChannels]}{[MediaInfo AudioLanguages]}{-Release Group}"
    movieFolderFormat: "{Movie CleanTitle} ({Release Year})"
  rootFolders:
    - path: /media/movies
  downloadClients:
    - name: qBittorrent
      protocol: torrent
      implementation: QBittorrent
      host: qbittorrent.media.svc.cluster.local
      port: 8080
      category: radarr
---
apiVersion: media-operator.dev/v1alpha1
kind: ProwlarrConfig
metadata:
  name: prowlarr
  namespace: media
spec:
  connection:
    url: http://prowlarr.media.svc.cluster.local:9696
    apiKeySecretRef:
      name: prowlarr-credentials
      key: api-key
  applications:
    - name: Sonarr
      implementation: Sonarr
      configContract: SonarrSettings
      syncLevel: fullSync
      baseUrl: http://sonarr.media.svc.cluster.local:8989
      prowlarrUrl: http://prowlarr.media.svc.cluster.local:9696
      apiKeySecretRef:
        name: sonarr-credentials
        key: api-key
      syncCategories: [5000, 5010, 5020, 5030, 5040, 5045, 5050]
    - name: Radarr
      implementation: Radarr
      configContract: RadarrSettings
      syncLevel: fullSync
      baseUrl: http://radarr.media.svc.cluster.local:7878
      prowlarrUrl: http://prowlarr.media.svc.cluster.local:9696
      apiKeySecretRef:
        name: radarr-credentials
        key: api-key
      syncCategories: [2000, 2010, 2020, 2030, 2040, 2045, 2050, 2060, 2070, 2080]
---
apiVersion: media-operator.dev/v1alpha1
kind: QBittorrentConfig
metadata:
  name: qbittorrent
  namespace: media
spec:
  connection:
    url: http://qbittorrent.media.svc.cluster.local:8080
    usernameSecretRef:
      name: qbittorrent-credentials
      key: username
    passwordSecretRef:
      name: qbittorrent-credentials
      key: password
  preferences:
    savePath: /downloads
    maxRatioEnabled: true
    maxRatio: "2.0"
    maxSeedingTimeEnabled: true
    maxSeedingTime: 10080  # 7 days
  categories:
    - name: tv-sonarr
      savePath: /downloads/tv
    - name: radarr
      savePath: /downloads/movies
---
apiVersion: media-operator.dev/v1alpha1
kind: JellyfinConfig
metadata:
  name: jellyfin
  namespace: media
spec:
  connection:
    url: http://jellyfin.media.svc.cluster.local:8096
  adminUser:
    usernameSecretRef:
      name: jellyfin-credentials
      key: username
    passwordSecretRef:
      name: jellyfin-credentials
      key: password
  server:
    serverName: "Homelab Media"
    preferredMetadataLanguage: "en"
    metadataCountryCode: "US"
  encoding:
    hardwareAccelerationType: vaapi
    vaapiDevice: "/dev/dri/renderD128"
    enableHardwareEncoding: true
    allowHevcEncoding: true
    enableTonemapping: true
  libraries:
    - name: Movies
      collectionType: movies
      paths:
        - /media/movies
    - name: TV Shows
      collectionType: tvshows
      paths:
        - /media/tv
