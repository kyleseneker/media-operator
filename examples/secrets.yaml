# Secrets for all *arr applications.
# Replace values with your actual credentials (base64-encoded).
# In production, use a tool like sealed-secrets or external-secrets.
---
apiVersion: v1
kind: Secret
metadata:
  name: sonarr-credentials
  namespace: media
type: Opaque
stringData:
  api-key: "your-sonarr-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: radarr-credentials
  namespace: media
type: Opaque
stringData:
  api-key: "your-radarr-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: prowlarr-credentials
  namespace: media
type: Opaque
stringData:
  api-key: "your-prowlarr-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: qbittorrent-credentials
  namespace: media
type: Opaque
stringData:
  username: "admin"
  password: "your-qbittorrent-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: jellyfin-credentials
  namespace: media
type: Opaque
stringData:
  username: "admin"
  password: "your-jellyfin-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: plex-credentials
  namespace: media
type: Opaque
stringData:
  token: "your-plex-token"
