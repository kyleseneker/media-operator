# This rule is not used by the project media-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the media-operator.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: media-operator
    app.kubernetes.io/managed-by: kustomize
  name: bazarrconfig-editor-role
rules:
- apiGroups:
  - media-operator.dev
  resources:
  - bazarrconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - media-operator.dev
  resources:
  - bazarrconfigs/status
  verbs:
  - get
