# This rule is not used by the project media-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to media-operator.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: media-operator
    app.kubernetes.io/managed-by: kustomize
  name: qbittorrentconfig-viewer-role
rules:
- apiGroups:
  - media-operator.dev
  resources:
  - qbittorrentconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - media-operator.dev
  resources:
  - qbittorrentconfigs/status
  verbs:
  - get
