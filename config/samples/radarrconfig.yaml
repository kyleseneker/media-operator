apiVersion: media-operator.dev/v1alpha1
kind: RadarrConfig
metadata:
  name: radarr
  namespace: arr
spec:
  connection:
    url: http://arr-radarr.arr.svc.cluster.local:7878
    apiKeySecretRef:
      name: arr-config-secrets
      key: RADARR_API_KEY
  mediaManagement:
    copyUsingHardlinks: true
    deleteEmptyFolders: true
    importExtraFiles: true
    extraFileExtensions: srt
    downloadPropersAndRepacks: doNotPrefer
    enableMediaInfo: true
    rescanAfterRefresh: always
    autoRenameFolders: true
    minimumFreeSpaceWhenImporting: 100
  naming:
    renameMovies: true
    replaceIllegalCharacters: true
    colonReplacementFormat: smart
    standardMovieFormat: "{Movie CleanTitle} {(Release Year)} [tmdbid-{TmdbId}] - {Edition Tags }{[Custom Formats]}{[Quality Full]}{[MediaInfo 3D]}{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[Mediainfo VideoCodec]}{-Release Group}"
    movieFolderFormat: "{Movie CleanTitle} ({Release Year}) [tmdbid-{TmdbId}]"
  indexerConfig:
    minimumAge: 0
    maximumSize: 0
    retention: 0
    rssSyncInterval: 15
    availabilityDelay: 0
    allowHardcodedSubs: true
  downloadClientConfig:
    enableCompletedDownloadHandling: true
    autoRedownloadFailed: true
    checkForFinishedDownloadInterval: 1
  ui:
    firstDayOfWeek: 0
    shortDateFormat: "MMM D YYYY"
    longDateFormat: "dddd, MMMM D YYYY"
    timeFormat: "h(:mm)a"
    showRelativeDates: true
    theme: auto
    movieRuntimeFormat: hoursMinutes
    uiLanguage: 1
  rootFolders:
    - path: /data/media/movies
  downloadClients:
    - name: qBittorrent
      protocol: torrent
      implementation: QBittorrent
      host: arr-vpn-downloads.arr.svc.cluster.local
      port: 8080
      category: movies
      usernameSecretRef:
        name: arr-config-secrets
        key: QBITTORRENT_USERNAME
      passwordSecretRef:
        name: arr-config-secrets
        key: QBITTORRENT_PASSWORD
  customFormats:
    - name: x265 (HD)
      specifications:
        - name: x265
          implementation: ReleaseTitleSpecification
          negate: false
          required: true
          fields:
            - name: value
              value: "[xh]\\.?265|HEVC"
        - name: Not 4K
          implementation: ResolutionSpecification
          negate: true
          required: true
          fields:
            - name: value
              value: 2160
  qualityProfiles:
    - name: HD-1080p
      upgradeAllowed: true
      cutoff: Bluray-1080p
      minFormatScore: 0
      items:
        - quality:
            id: 0
            name: Unknown
          allowed: false
        - name: WEB 1080p
          allowed: true
          items:
            - quality:
                id: 3
                name: WEBDL-1080p
            - quality:
                id: 15
                name: WEBRip-1080p
        - quality:
            id: 7
            name: Bluray-1080p
          allowed: true
        - quality:
            id: 30
            name: Remux-1080p
          allowed: true
      formatItems:
        - name: x265 (HD)
          score: -5000
  tags:
    - label: hdr
  notifications:
    - name: Discord
      implementation: Discord
      onGrab: true
      onDownload: true
      onUpgrade: true
      onMovieAdded: true
      onHealthIssue: true
      fields:
        - name: webHookUrl
          value: "https://discord.com/api/webhooks/your-webhook-url"
  importLists:
    - name: Trakt Popular Movies
      implementation: TraktPopularImport
      enableAutomaticAdd: true
      monitor: movieOnly
      qualityProfileName: HD-1080p
      rootFolderPath: /data/media/movies
      minimumAvailability: released
      fields:
        - name: accessToken
          value: "your-trakt-token"
        - name: limit
          value: 100
