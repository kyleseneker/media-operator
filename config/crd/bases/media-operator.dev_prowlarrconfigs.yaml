                  - configContract
                  - implementation
                  - name
                  type: object
                type: array
              notifications:
                description: notifications defines notification/connection configurations.
                items:
                  description: Notification defines a notification/connection for
                    a Servarr app.
                  properties:
                    configContract:
                      description: |-
                        configContract is the configuration contract name for the implementation.
                        Defaults to "<implementation>Settings" if not set.
                      type: string
                    fields:
                      description: fields defines the notification's configuration
                        fields (e.g., webhook URL, API token).
                      items:
                        description: ConfigField represents a key-value field in a
                          download client configuration.
                        properties:
                          name:
                            description: name is the field name.
                            type: string
                          value:
                            description: value is the field value. Can be a string,
                              number, or boolean.
                            x-kubernetes-preserve-unknown-fields: true
                        required:
                        - name
                        type: object
                      type: array
                    implementation:
                      description: implementation is the notification type (e.g.,
                        Discord, Slack, Webhook, Email).
                      type: string
                    includeHealthWarnings:
                      description: includeHealthWarnings includes health warnings
                        (not just errors) in notifications.
                      type: boolean
                    name:
                      description: name is the display name of the notification.
                      type: string
                    onApplicationUpdate:
                      description: onApplicationUpdate fires when the application
                        is updated.
                      type: boolean
                    onDownload:
                      description: onDownload fires when a download is imported.
                      type: boolean
                    onEpisodeFileDelete:
                      description: onEpisodeFileDelete fires when an episode file
                        is deleted (Sonarr).
                      type: boolean
                    onEpisodeFileDeleteForUpgrade:
                      description: onEpisodeFileDeleteForUpgrade fires when an episode
                        file is deleted for upgrade (Sonarr).
                      type: boolean
                    onGrab:
                      description: onGrab fires when a release is grabbed (sent to
                        download client).
                      type: boolean
                    onHealthIssue:
                      description: onHealthIssue fires when a health check fails.
                      type: boolean
                    onHealthRestored:
                      description: onHealthRestored fires when a health check recovers.
                      type: boolean
                    onManualInteractionRequired:
                      description: onManualInteractionRequired fires when manual interaction
