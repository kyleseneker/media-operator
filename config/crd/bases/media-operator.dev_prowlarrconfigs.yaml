                      type: string
                    name:
                      description: name is the display name of the proxy.
                      type: string
                    requestTimeout:
                      description: requestTimeout is the request timeout in seconds.
                      type: integer
                    tags:
                      description: tags is the list of tag IDs to associate with this
                        proxy.
                      items:
                        type: integer
                      type: array
                  required:
                  - configContract
                  - host
                  - implementation
                  - name
                  type: object
                type: array
              reconcile:
                description: reconcile configures reconciliation behavior (e.g., sync
                  interval).
                properties:
                  interval:
                    description: |-
                      interval overrides the default reconciliation interval (default: 5m).
                      Uses standard Kubernetes duration format (e.g., "30s", "5m", "1h").
                    type: string
                  prune:
                    description: |-
                      prune enables deletion of resources that exist in the app but are not declared in the CRD.
                      When true, for each resource type where at least one item is specified, any existing
                      resources not matching a declared item will be removed from the app.
                      Root folders and tags are never pruned.
                      Default: false (only create/update, never delete).
                    type: boolean
                type: object
              tags:
                description: tags defines tags for linking resources together.
                items:
                  description: |-
                    Tag defines a tag that can be used to link resources together
