                      type: boolean
                    onMovieFileDeleteForUpgrade:
                      description: onMovieFileDeleteForUpgrade fires when a movie
                        file is deleted for upgrade (Radarr).
                      type: boolean
                    onRename:
                      description: onRename fires when files are renamed.
                      type: boolean
                    onSeriesAdd:
                      description: onSeriesAdd fires when a new series is added (Sonarr).
                      type: boolean
                    onSeriesDelete:
                      description: onSeriesDelete fires when a series is deleted (Sonarr).
                      type: boolean
                    onUpgrade:
                      description: onUpgrade fires when an existing file is upgraded.
                      type: boolean
                    tags:
                      description: tags is the list of tag IDs to associate with this
                        notification.
                      items:
                        type: integer
                      type: array
                  required:
                  - implementation
                  - name
                  type: object
                type: array
              proxies:
                description: proxies defines proxy configurations for Prowlarr.
                items:
                  description: ProwlarrProxy defines a proxy configuration for Prowlarr.
                  properties:
                    configContract:
                      description: configContract is the configuration contract name
