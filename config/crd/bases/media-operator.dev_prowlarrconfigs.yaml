                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                description: lastSyncTime is the timestamp of the last successful
                  reconciliation.
                format: date-time
                type: string
              observedGeneration:
                description: observedGeneration is the most recent generation observed.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
