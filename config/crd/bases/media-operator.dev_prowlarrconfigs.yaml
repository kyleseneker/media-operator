                            items:
                              type: integer
                            type: array
                          clientCategory:
                            description: clientCategory is the category name in the
                              download client.
                            type: string
                        required:
                        - clientCategory
                        type: object
                      type: array
                    configContract:
                      description: |-
                        configContract is the configuration contract name.
                        Defaults to "<implementation>Settings" if not set.
                      type: string
                    enable:
                      default: true
                      description: enable controls whether this download client is
                        active.
                      type: boolean
                    fields:
                      description: fields defines the download client's configuration
                        fields (e.g., host, port, apiKey).
                      items:
                        description: ProwlarrField represents a key-value configuration
                          field.
                        properties:
                          name:
                            description: name is the field name.
                            type: string
                          value:
                            description: value is the field value. Use "ENV:VAR_NAME"
                              convention for secret references.
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                    implementation:
                      description: implementation is the download client type (e.g.,
                        QBittorrent, Sabnzbd).
                      type: string
                    name:
                      description: name is the display name of the download client.
                      type: string
                    priority:
                      description: priority is the download client priority. Lower
                        values are higher priority.
                      type: integer
                    protocol:
                      description: protocol is the download protocol.
                      enum:
                      - torrent
                      - usenet
                      type: string
                    tags:
                      description: tags is the list of tag IDs to associate with this
