              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProwlarrConfigSpec defines the desired state of ProwlarrConfig.
            properties:
              applications:
                description: applications defines application connections managed
                  by Prowlarr.
                items:
                  description: ProwlarrApplication defines an application connection
                    managed by Prowlarr.
                  properties:
                    apiKeySecretRef:
                      description: apiKeySecretRef references a Secret containing
