              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SabnzbdConfigSpec defines the desired state of SabnzbdConfig.
            properties:
              categories:
                description: categories defines download categories.
                items:
                  description: SabnzbdCategory defines a download category.
                  properties:
                    dir:
                      description: dir is the subdirectory for this category (relative
                        to complete dir).
                      type: string
                    name:
                      description: name is the category name.
                      type: string
                    priority:
                      description: priority is the download priority. -100=default,
