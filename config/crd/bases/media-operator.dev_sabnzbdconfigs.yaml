                  url:
                    description: url is the base URL of the app (e.g., http://arr-sonarr.arr.svc.cluster.local:8989).
                    type: string
                required:
                - apiKeySecretRef
                - url
                type: object
              folders:
                description: folders configures download and temp folder paths.
                properties:
                  completeDir:
                    description: completeDir is the path for completed downloads.
                    type: string
                  incompleteDir:
                    description: incompleteDir is the path for incomplete downloads.
                    type: string
                  nzbBackupDir:
                    description: nzbBackupDir is the path for NZB backups.
