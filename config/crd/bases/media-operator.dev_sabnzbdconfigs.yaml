                  description: SabnzbdServer defines a Usenet server connection.
                  properties:
                    connections:
                      description: connections is the number of simultaneous connections.
                      type: integer
                    enable:
                      default: true
                      description: enable controls whether this server is active.
                      type: boolean
                    host:
                      description: host is the hostname of the Usenet server.
                      type: string
                    name:
                      description: name is the display name of the server.
                      type: string
                    passwordSecretRef:
                      description: passwordSecretRef references a Secret containing
                        the password.
                      properties:
                        key:
                          description: key is the key within the Secret.
                          type: string
                        name:
                          description: name is the name of the Secret.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                    port:
                      description: port is the port number.
                      type: integer
                    priority:
                      description: priority is the server priority. 0 = highest.
                      type: integer
                    retention:
                      description: retention is the server retention in days. 0 =
                        unlimited.
                      type: integer
                    ssl:
                      description: ssl enables SSL/TLS connection.
                      type: boolean
                    usernameSecretRef:
                      description: usernameSecretRef references a Secret containing
                        the username.
                      properties:
                        key:
                          description: key is the key within the Secret.
                          type: string
                        name:
                          description: name is the name of the Secret.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - host
                  - name
                  - port
                  type: object
                type: array
